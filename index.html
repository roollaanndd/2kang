<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="description" content="OMDC Dental - Senyum Sehat, Percaya Diri Penuh. Klinik gigi terpercaya dengan dokter spesialis berpengalaman dan teknologi modern." />
    <meta name="theme-color" content="#E91E8C" />
    <!-- Apple PWA: standalone mode hides browser chrome when added to home screen -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="OMDC Dental" />
    <!-- Android PWA -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="format-detection" content="telephone=no" />
    <!-- Open Graph -->
    <meta property="og:title" content="OMDC Dental" />
    <meta property="og:description" content="Senyum Sehat, Percaya Diri Penuh - Klinik Gigi Terpercaya" />
    <meta property="og:type" content="website" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icons/icon-192.svg" />
    <link rel="icon" type="image/svg+xml" href="/icons/favicon.svg" />
    <title>OMDC Dental - Senyum Sehat, Percaya Diri Penuh</title>
    <!-- Google Fonts: Syne (headlines) + Manrope (body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- SPA redirect restore for GitHub Pages 404 trick -->
    <script>
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location));
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- PWA Service Worker registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker
            .register('%BASE_URL%sw.js', { scope: '%BASE_URL%' })
            .catch(function (err) { console.warn('SW registration failed:', err); });
        });
      }
    </script>
  </body>
</html>
