  <!-- Root dividers -->
  <rect x="82" y="100" width="8" height="22" rx="4" fill="white" opacity="0.65"/>
  <rect x="102" y="100" width="8" height="22" rx="4" fill="white" opacity="0.65"/>
  <!-- Shine on tooth -->
