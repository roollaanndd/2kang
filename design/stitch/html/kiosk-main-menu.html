<!DOCTYPE html>
<html lang="id"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>OMDC Dental - eKiosk Menu Utama</title>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Google Fonts: Plus Jakarta Sans (headlines) + Inter (body) -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Plus+Jakarta+Sans:wght@500;700;800;900&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Tailwind Config — OMDC Light Organic 2026 -->
<script id="tailwind-config">
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          primary: '#E91E8C',
          secondary: '#FF6BB5',
          accent: '#06B6D4',
          dark: '#0D1421',
          muted: '#6B7280',
          surface: '#FFF5F9',
          bg: '#FFFFFF',
        },
        borderRadius: { "DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "2xl": "1.5rem", "full": "9999px" },
        fontFamily: {
          "headline": ["Plus Jakarta Sans", "sans-serif"],
          "display": ["Plus Jakarta Sans", "sans-serif"],
          "body": ["Inter", "sans-serif"],
          "label": ["Inter", "sans-serif"]
        },
        backgroundImage: {
          'gradient-brand': 'linear-gradient(90deg, #E91E8C, #FF6BB5, #06B6D4)',
          'gradient-primary': 'linear-gradient(to right, #E91E8C, #FF6BB5)',
        }
      },
    },
  }
</script>
<style>
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  .gradient-text { background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
</style>
</head>
<!-- Kiosk canvas: fixed landscape 1280×800, scaled to fit terminal in production -->
<body class="font-body text-muted bg-bg antialiased">
<div class="relative mx-auto overflow-hidden bg-[#F9FAFB]" style="width:1280px;height:800px;">
  <!-- Signature 3px brand strip -->
  <div class="absolute top-0 left-0 w-full h-[3px] bg-gradient-brand z-[60]"></div>

  <!-- Persistent header -->
  <header class="flex items-center justify-between h-[88px] px-10 bg-white border-b border-pink-50">
    <div class="flex items-center gap-3">
      <div class="h-11 w-11 rounded-2xl bg-gradient-primary flex items-center justify-center text-white">
        <span class="material-symbols-outlined" style="font-variation-settings:'FILL' 1;">favorite</span>
      </div>
      <span class="font-headline font-black text-xl text-dark tracking-tight">OMDC Dental</span>
    </div>
    <div class="flex items-center gap-6">
      <div class="text-right">
        <div class="font-label text-[10px] font-bold uppercase tracking-widest text-muted">Sedang Dilayani</div>
      </div>
      <div class="font-headline font-black text-2xl text-white bg-gradient-primary rounded-xl px-5 py-1.5 tracking-widest" style="font-variant-numeric:tabular-nums;">A018</div>
    </div>
  </header>

  <!-- Body: asymmetric split — brand rail + 2×2 action grid -->
  <div class="flex h-[calc(800px-88px-3px)]">
    <!-- Brand rail -->
    <aside class="w-[320px] shrink-0 p-9 flex flex-col justify-between" style="background:linear-gradient(165deg,#FFF5F9 0%,#FFE4F1 52%,#ECFEFF 100%);">
      <div>
        <h1 class="font-headline font-black text-[26px] text-dark tracking-tight leading-none">
          OMDC <span class="gradient-text bg-gradient-primary">Dental</span>
        </h1>
        <p class="font-body text-sm text-muted mt-3 leading-relaxed">Senyum sehat, percaya diri penuh.</p>
      </div>
      <div class="grid grid-cols-1 gap-4">
        <div><div class="font-headline font-black text-lg text-dark">5.000+</div><div class="font-label text-xs text-muted">Pasien terlayani</div></div>
        <div><div class="font-headline font-black text-lg text-dark">15</div><div class="font-label text-xs text-muted">Tahun pengalaman</div></div>
        <div><div class="font-headline font-black text-lg text-dark">8</div><div class="font-label text-xs text-muted">Dokter spesialis</div></div>
      </div>
      <div class="inline-flex items-center gap-2 self-start bg-emerald-50 text-emerald-700 font-label text-xs font-bold px-3 py-1.5 rounded-full">
        <span class="w-2 h-2 rounded-full bg-emerald-500"></span> Kiosk Active
      </div>
    </aside>

    <!-- Action grid -->
    <main class="flex-1 p-10">
      <header class="mb-8">
        <p class="font-label text-xs font-bold uppercase tracking-widest text-primary mb-1.5">Selamat Datang</p>
        <h2 class="font-headline font-black text-4xl text-dark tracking-tight leading-tight">Ada yang bisa kami bantu?</h2>
      </header>
      <div class="grid grid-cols-2 grid-rows-2 gap-5 h-[460px]">
        <!-- Each tile: left accent bar, icon, title, subtitle -->
        <button class="relative text-left bg-white rounded-2xl p-7 border border-pink-50 shadow-[0_4px_24px_rgba(233,30,140,0.08)] overflow-hidden active:scale-[0.98] transition">
          <span class="absolute top-0 left-0 h-full w-1.5 bg-gradient-primary"></span>
          <span class="material-symbols-outlined text-white w-14 h-14 rounded-2xl bg-gradient-primary flex items-center justify-center text-3xl mb-4">confirmation_number</span>
          <div class="font-headline font-black text-xl text-dark">Ambil Nomor Antrian</div>
          <div class="font-body text-sm text-muted mt-1.5">Booking layanan &amp; dapatkan nomor</div>
        </button>
        <button class="relative text-left bg-white rounded-2xl p-7 border border-pink-50 shadow-[0_4px_24px_rgba(6,182,212,0.08)] overflow-hidden active:scale-[0.98] transition">
          <span class="absolute top-0 left-0 h-full w-1.5" style="background:linear-gradient(180deg,#06B6D4,#0284C7);"></span>
          <span class="material-symbols-outlined text-white w-14 h-14 rounded-2xl flex items-center justify-center text-3xl mb-4" style="background:linear-gradient(135deg,#06B6D4,#0284C7);">how_to_reg</span>
          <div class="font-headline font-black text-xl text-dark">Check-in Pasien Lama</div>
          <div class="font-body text-sm text-muted mt-1.5">QR, no. HP, atau rekam medis</div>
        </button>
        <button class="relative text-left bg-white rounded-2xl p-7 border border-pink-50 shadow-[0_4px_24px_rgba(16,185,129,0.08)] overflow-hidden active:scale-[0.98] transition">
          <span class="absolute top-0 left-0 h-full w-1.5" style="background:linear-gradient(180deg,#10B981,#059669);"></span>
          <span class="material-symbols-outlined text-white w-14 h-14 rounded-2xl flex items-center justify-center text-3xl mb-4" style="background:linear-gradient(135deg,#10B981,#059669);">person_add</span>
          <div class="font-headline font-black text-xl text-dark">Registrasi Pasien Baru</div>
          <div class="font-body text-sm text-muted mt-1.5">Daftar cepat dengan KTP</div>
        </button>
        <button class="relative text-left bg-white rounded-2xl p-7 border border-pink-50 shadow-[0_4px_24px_rgba(245,158,11,0.08)] overflow-hidden active:scale-[0.98] transition">
          <span class="absolute top-0 left-0 h-full w-1.5" style="background:linear-gradient(180deg,#F59E0B,#D97706);"></span>
          <span class="material-symbols-outlined text-white w-14 h-14 rounded-2xl flex items-center justify-center text-3xl mb-4" style="background:linear-gradient(135deg,#F59E0B,#D97706);">campaign</span>
          <div class="font-headline font-black text-xl text-dark">Informasi &amp; Promo</div>
          <div class="font-body text-sm text-muted mt-1.5">Jadwal, lokasi, &amp; penawaran</div>
        </button>
      </div>
    </main>
  </div>
</div>
</body></html>
