<!DOCTYPE html>

<html lang="id"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>Masuk - OMDC Dental</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Plus+Jakarta+Sans:wght@600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#E91E8C",
                        rose: "#FF6BB5",
                        aqua: "#06B6D4",
                        dark: "#0D1421",
                        muted: "#6B7280",
                        pinkLight: "#FFF5F9",
                        aquaLight: "#ECFEFF"
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "2xl": "1.25rem",
                        "full": "9999px"
                    },
                    fontFamily: {
                        "headline": ["Plus Jakarta Sans", "sans-serif"],
                        "display": ["Plus Jakarta Sans", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                        "label": ["Inter", "sans-serif"]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .icon-fill {
            font-variation-settings: 'FILL' 1;
        }
        input:-webkit-autofill,
        input:-webkit-autofill:hover, 
        input:-webkit-autofill:focus, 
        input:-webkit-autofill:active{
            -webkit-box-shadow: 0 0 0 30px #FFF5F9 inset !important;
            -webkit-text-fill-color: #0D1421 !important;
            transition: background-color 5000s ease-in-out 0s;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen antialiased selection:bg-rose selection:text-white">
<div class="w-full max-w-[390px] min-h-[884px] bg-white relative flex flex-col font-body text-dark overflow-hidden shadow-2xl sm:rounded-[2.5rem] sm:min-h-[844px] sm:max-h-[844px] sm:my-8 border-x sm:border border-gray-100">
<div class="absolute top-0 left-0 right-0 h-[3px] w-full bg-gradient-to-r from-primary via-rose to-aqua z-50"></div>
<div class="pt-14 pb-8 flex flex-col items-center shrink-0">
<div class="w-14 h-14 bg-pinkLight rounded-2xl flex items-center justify-center mb-3 text-primary shadow-sm border border-pink-50">
<span class="material-symbols-outlined text-3xl icon-fill">dentistry</span>
</div>
<h1 class="font-headline font-black text-xl tracking-tight text-dark">OMDC Dental</h1>
</div>
<div class="flex-1 px-6 pb-8 flex flex-col overflow-y-auto hide-scrollbar">
<div class="mb-8">
<h2 class="font-headline font-bold text-3xl mb-2 text-dark">Masuk</h2>
<p class="text-muted text-sm leading-relaxed">Senyum Sehat, Percaya Diri Penuh. Silakan masuk untuk melanjutkan.</p>
</div>
<form class="flex flex-col gap-5 shrink-0" onsubmit="event.preventDefault();">
<div class="relative group">
<label class="block text-[11px] font-semibold text-muted mb-1.5 uppercase tracking-wider ml-1" for="identity">Email / Nomor HP</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-muted group-focus-within:text-primary transition-colors text-[20px]">person</span>
<input class="w-full bg-pinkLight/60 border border-pink-100 rounded-2xl py-3.5 pl-12 pr-4 text-sm focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all placeholder:text-muted/40 text-dark font-medium shadow-sm" id="identity" placeholder="Masukkan email atau nomor HP" type="text"/>
</div>
</div>
<div class="relative group">
<label class="block text-[11px] font-semibold text-muted mb-1.5 uppercase tracking-wider ml-1" for="password">Password</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-muted group-focus-within:text-primary transition-colors text-[20px]">lock</span>
<input class="w-full bg-pinkLight/60 border border-pink-100 rounded-2xl py-3.5 pl-12 pr-12 text-sm focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all placeholder:text-muted/40 text-dark font-medium shadow-sm" id="password" placeholder="Masukkan password Anda" type="password"/>
<button class="absolute right-4 text-muted hover:text-primary transition-colors focus:outline-none flex items-center justify-center" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined text-[20px]" id="eye-icon">visibility_off</span>
</button>
</div>
</div>
<div class="flex justify-end mt-[-8px]">
<a class="text-[13px] font-semibold text-primary hover:text-rose transition-colors" href="#">Lupa password?</a>
</div>
<button class="w-full bg-gradient-to-r from-primary to-rose text-white font-headline font-bold text-[15px] rounded-2xl py-4 mt-2 shadow-[0_8px_20px_rgb(233,30,140,0.25)] active:scale-95 transition-all flex items-center justify-center gap-2" type="submit">
                    Masuk
                    <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</form>
<div class="flex items-center gap-4 my-8 shrink-0">
<div class="flex-1 h-[1px] bg-gray-200"></div>
<span class="text-[11px] text-muted font-semibold uppercase tracking-wider">atau</span>
<div class="flex-1 h-[1px] bg-gray-200"></div>
</div>
<div class="flex flex-col gap-3 shrink-0">
<button class="w-full flex items-center justify-center gap-3 bg-white border border-gray-200 rounded-2xl py-3.5 hover:bg-gray-50 active:scale-[0.98] transition-all shadow-sm">
<svg class="w-5 h-5" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path><path d="M1 1h22v22H1z" fill="none"></path></svg>
<span class="text-sm font-semibold text-dark">Lanjutkan dengan Google</span>
</button>
<button class="w-full flex items-center justify-center gap-3 bg-white border border-gray-200 rounded-2xl py-3.5 hover:bg-gray-50 active:scale-[0.98] transition-all shadow-sm">
<svg class="w-5 h-5" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M16.365 7.143c.969-.974 1.614-2.316 1.43-3.643-1.127.042-2.585.666-3.541 1.637-.84.861-1.63 2.228-1.42 3.535 1.258.083 2.565-.558 3.531-1.529zm1.196 3.987c-.015-1.921 1.674-2.825 1.748-2.868-1.026-1.378-2.683-1.564-3.266-1.583-1.382-.128-2.736.758-3.447.758-.718 0-1.838-.737-3.003-.717-1.493.02-2.885.801-3.655 2.032-1.568 2.518-.403 6.242 1.134 8.28 .747.989 1.633 2.1 2.766 2.059 1.096-.04 1.517-.66 2.836-.66 1.309 0 1.69.66 2.855.639 1.206-.02 1.956-1.008 2.685-1.977.854-1.155 1.203-2.274 1.22-2.333-.024-.01-2.183-.778-2.183-3.082h.001l.31-5.448z" fill="#0D1421"></path></svg>
<span class="text-sm font-semibold text-dark">Lanjutkan dengan Apple</span>
</button>
</div>
<div class="mt-auto pt-8 text-center shrink-0">
<p class="text-[13px] text-muted font-medium">Belum punya akun? <a class="font-bold text-primary hover:text-rose transition-colors ml-1" href="#">Daftar</a></p>
</div>
</div>
</div>
<script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eye-icon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.textContent = 'visibility';
            } else {
                passwordInput.type = 'password';
                eyeIcon.textContent = 'visibility_off';
            }
        }
    </script>
</body></html>
