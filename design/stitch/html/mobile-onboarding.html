<!DOCTYPE html>

<html lang="id"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>OMDC Dental - Onboarding</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;900&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        'omdc-pink': '#E91E8C',
                        'omdc-rose': '#FF6BB5',
                        'omdc-aqua': '#06B6D4',
                        'omdc-dark': '#0D1421',
                        'omdc-muted': '#6B7280',
                        'omdc-bg': '#FFFFFF',
                        'omdc-pink-light': '#FFF5F9',
                    },
                    borderRadius: {
                        DEFAULT: "0.5rem",
                        lg: "1rem",
                        xl: "1.5rem",
                        full: "9999px"
                    },
                    fontFamily: {
                        headline: ["Plus Jakarta Sans", "sans-serif"],
                        display: ["Plus Jakarta Sans", "sans-serif"],
                        body: ["Inter", "sans-serif"],
                        label: ["Inter", "sans-serif"]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-omdc-bg text-omdc-dark font-body antialiased min-h-screen flex flex-col items-center justify-center relative overflow-hidden">
<!-- Signature 3px top strip -->
<div class="fixed top-0 left-0 w-full h-[3px] bg-gradient-to-r from-omdc-pink via-omdc-rose to-omdc-aqua z-50"></div>
<!-- Mobile Container (Max Width to simulate app on desktop) -->
<div class="w-full max-w-md mx-auto min-h-screen flex flex-col relative px-6 py-8">
<!-- Top App Bar Area (Custom for Onboarding) -->
<header class="w-full flex justify-end items-center py-4">
<button class="text-omdc-muted hover:text-omdc-pink transition-colors font-label font-medium text-sm px-4 py-2 rounded-full hover:bg-omdc-pink-light">
                Lewati
            </button>
</header>
<!-- Main Content Area -->
<main class="flex-1 flex flex-col items-center justify-center w-full mt-4 mb-8">
<!-- Illustration Container (Glassmorphism inspired subtle background) -->
<div class="w-full aspect-square max-w-[320px] mx-auto mb-10 rounded-3xl relative overflow-hidden bg-gradient-to-b from-omdc-pink-light/50 to-transparent p-4 flex items-center justify-center">
<!-- Decorative background elements -->
<div class="absolute inset-0 bg-white/40 backdrop-blur-sm rounded-3xl z-0 border border-omdc-pink-light/20"></div>
<img alt="Friendly dental illustration for OMDC mobile app onboarding" class="w-full h-full object-contain relative z-10 drop-shadow-xl animate-[float_6s_ease-in-out_infinite]" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC1w4cvbdYjxfVenUd7tN_p60fTLksacPF7v6SdIexxkoogYmWaSkUO7Cr8PZdgqToEn4uSxgqW4RApYlb3MJE5RVws-5j0f55QpsFF_sY0GomMVPHdy51dnibOp8rhk80WizjLZfDYuQ4KN8dfLT0i7_LPBwEwjIm134O-zw9gpJm498i1hzwhqDR_b_MYID-MFuvcN6YuOfp0haO63MZzO1dNOOqGL7kc2VNnr4YWtL1SnUCAa7rYhyP4eXt8a2rSU6P0RPGd4lk"/>
</div>
<!-- Text Content -->
<div class="text-center w-full max-w-[300px] mx-auto space-y-4">
<h1 class="font-headline font-bold text-2xl tracking-tight text-omdc-dark leading-tight">
                    Senyum Sehat<br/>Mulai Dari Sini
                </h1>
<p class="font-body text-omdc-muted text-sm leading-relaxed px-2">
                    Nikmati perawatan gigi premium dengan kenyamanan maksimal untuk Anda dan keluarga.
                </p>
</div>
</main>
<!-- Bottom Action Area -->
<footer class="w-full flex flex-col items-center gap-8 mt-auto pb-6">
<!-- Progress Indicators -->
<div class="flex flex-col items-center gap-4 w-full">
<!-- Dots -->
<div class="flex items-center gap-2">
<div class="w-8 h-2 rounded-full bg-omdc-pink transition-all duration-300"></div>
<div class="w-2 h-2 rounded-full bg-omdc-muted/20 transition-all duration-300"></div>
<div class="w-2 h-2 rounded-full bg-omdc-muted/20 transition-all duration-300"></div>
<div class="w-2 h-2 rounded-full bg-omdc-muted/20 transition-all duration-300"></div>
<div class="w-2 h-2 rounded-full bg-omdc-muted/20 transition-all duration-300"></div>
</div>
<!-- Progress Bar (Visual embellishment based on prompt) -->
<div class="w-1/2 h-1 bg-omdc-muted/10 rounded-full overflow-hidden">
<div class="h-full w-[20%] bg-omdc-pink rounded-full transition-all duration-500"></div>
</div>
</div>
<!-- Main CTA Button -->
<button class="w-full py-4 rounded-xl font-headline font-bold text-white bg-gradient-to-r from-omdc-pink to-omdc-rose shadow-[0_8px_20px_rgb(233,30,140,0.25)] hover:shadow-[0_8px_25px_rgb(233,30,140,0.35)] active:scale-95 transition-all duration-200 flex items-center justify-center gap-2 group">
<span>Lanjut</span>
<span class="material-symbols-outlined text-lg group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</footer>
</div>
<!-- Simple CSS animation for illustration -->
<style>
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
    </style>
</body></html>
