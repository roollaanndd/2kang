<!DOCTYPE html>
<html lang="id"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>OMDC Dental - eKiosk Welcome</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Plus+Jakarta+Sans:wght@500;700;800;900&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
  tailwind.config = {
    theme: { extend: {
      colors: { primary: '#E91E8C', secondary: '#FF6BB5', accent: '#06B6D4', dark: '#0D1421', muted: '#6B7280', surface: '#FFF5F9', bg: '#FFFFFF' },
      borderRadius: { "lg": "1rem", "xl": "1.5rem", "2xl": "1.5rem", "full": "9999px" },
      fontFamily: { "headline": ["Plus Jakarta Sans","sans-serif"], "display": ["Plus Jakarta Sans","sans-serif"], "body": ["Inter","sans-serif"], "label": ["Inter","sans-serif"] },
      backgroundImage: { 'gradient-brand': 'linear-gradient(90deg, #E91E8C, #FF6BB5, #06B6D4)', 'gradient-primary': 'linear-gradient(to right, #E91E8C, #FF6BB5)' }
    } },
  }
</script>
<style>
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400; }
  .gradient-text { background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
</style>
</head>
<body class="font-body text-muted bg-bg antialiased">
<div class="relative mx-auto overflow-hidden flex" style="width:1280px;height:800px;">
  <div class="absolute top-0 left-0 w-full h-[3px] bg-gradient-brand z-[60]"></div>

  <!-- Left brand panel: live queue + stats -->
  <aside class="w-[46%] shrink-0 p-14 flex flex-col justify-between" style="background:linear-gradient(160deg,#FFF5F9 0%,#FFFFFF 55%,#ECFEFF 100%);">
    <div class="flex items-center gap-3">
      <div class="h-12 w-12 rounded-2xl bg-gradient-primary flex items-center justify-center text-white">
        <span class="material-symbols-outlined" style="font-variation-settings:'FILL' 1;">favorite</span>
      </div>
      <span class="font-headline font-black text-2xl text-dark tracking-tight">OMDC Dental</span>
    </div>
    <div>
      <div class="font-label text-[11px] font-extrabold uppercase tracking-[0.14em] text-muted mb-2">Sedang Dilayani</div>
      <div class="font-headline font-black text-[96px] leading-none gradient-text bg-gradient-primary tracking-tighter">A018</div>
      <div class="mt-6 inline-flex items-center gap-2 bg-emerald-50 text-emerald-700 font-label text-sm font-bold px-4 py-2 rounded-full">
        <span class="w-2 h-2 rounded-full bg-emerald-500"></span> 4 Dokter Online
      </div>
    </div>
    <div class="grid grid-cols-3 gap-4">
      <div><div class="font-headline font-black text-xl text-dark">12</div><div class="font-label text-xs text-muted">Menunggu</div></div>
      <div><div class="font-headline font-black text-xl text-dark">~8</div><div class="font-label text-xs text-muted">Menit</div></div>
      <div><div class="font-headline font-black text-xl text-dark">147</div><div class="font-label text-xs text-muted">Hari ini</div></div>
    </div>
  </aside>

  <!-- Right interactive panel: tagline + touch CTA -->
  <main class="flex-1 bg-white flex flex-col items-center justify-center text-center px-16">
    <div class="font-label text-sm font-bold uppercase tracking-[0.2em] text-primary mb-5">Selamat Datang</div>
    <h1 class="font-headline font-black text-[42px] text-dark tracking-tight leading-tight mb-3">
      Senyum Sehat, <span class="gradient-text bg-gradient-brand">Percaya Diri</span>
    </h1>
    <p class="font-body text-lg text-muted mb-12">Gigi lebih sehat, senyum lebih percaya diri</p>
    <button class="bg-gradient-primary text-white font-headline font-extrabold text-2xl rounded-full px-16 py-6 shadow-[0_16px_50px_rgba(233,30,140,0.35)] active:scale-[0.98] transition inline-flex items-center gap-3">
      <span class="material-symbols-outlined text-3xl">touch_app</span> Sentuh Layar untuk Memulai
    </button>
  </main>
</div>
</body></html>
