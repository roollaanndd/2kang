name: Auto-merge to main

on:
  push:
    branches:
      - develop

permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          GITHUB_PAGES: true

  merge:
    name: Merge → main
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge feature branch into main
        run: |
          git checkout main
          git pull origin main
          # -X theirs: on any conflict, always take the feature branch version
          git merge --no-ff -X theirs origin/${{ github.ref_name }} \
            -m "chore: auto-merge ${{ github.ref_name }} [$(date +'%Y-%m-%d %H:%M UTC')]"
          git push origin main
